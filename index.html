<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정부24 · 민원도우미</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --brand:#0057b8;--brand-2:#003d82;--ink:#0f1222;--sub:#8b90a8;
    --bg:#eef3fa;--card:#ffffff;--bot-bubble:#f0f5fb;--user-bubble:linear-gradient(135deg,#0057b8,#003d82);
    --line:#dde4ef;--shadow:0 20px 50px -12px rgba(0,50,120,.22);
  }
  body{
    font-family:-apple-system,"Apple SD Gothic Neo","Pretendard","Segoe UI",sans-serif;
    background:
      radial-gradient(1200px 600px at 15% -10%,#d8e8ff 0%,transparent 55%),
      radial-gradient(1000px 700px at 110% 10%,#ccddf5 0%,transparent 50%),
      var(--bg);
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;color:var(--ink);
  }
  .app{
    width:min(440px,100%);height:min(720px,92vh);background:var(--card);
    border-radius:28px;display:flex;flex-direction:column;overflow:hidden;
    box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.7);
  }
  header{padding:18px 20px;display:flex;align-items:center;gap:13px;border-bottom:1px solid var(--line)}
  .avatar{
    width:44px;height:44px;border-radius:14px;flex:none;position:relative;
    background:linear-gradient(135deg,var(--brand),var(--brand-2));
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:700;
    box-shadow:0 8px 18px -6px rgba(0,87,184,.5);
  }
  .avatar::after{content:"";position:absolute;right:-2px;bottom:-2px;width:13px;height:13px;border-radius:50%;background:#26d07c;border:2.5px solid #fff}
  .htxt h1{font-size:16px;font-weight:750;letter-spacing:-.2px}
  .htxt p{font-size:12.5px;color:var(--sub);margin-top:2px;display:flex;align-items:center;gap:5px}
  .htxt p::before{content:"";width:6px;height:6px;border-radius:50%;background:#26d07c}
  .badge{margin-left:auto;font-size:10px;font-weight:600;color:var(--brand);background:#e8f0fb;padding:4px 10px;border-radius:20px;border:1px solid #c5d8f5}
  #log{flex:1;overflow-y:auto;padding:22px 18px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
  #log::-webkit-scrollbar{width:6px}
  #log::-webkit-scrollbar-thumb{background:#d0d8e8;border-radius:3px}
  .row{display:flex;gap:9px;align-items:flex-end;max-width:88%;animation:pop .26s cubic-bezier(.2,.8,.2,1)}
  .row.user{align-self:flex-end;flex-direction:row-reverse}
  .row .pic{width:28px;height:28px;border-radius:9px;flex:none;background:linear-gradient(135deg,var(--brand),var(--brand-2));display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700}
  .bubble{padding:11px 15px;border-radius:18px;font-size:14.5px;line-height:1.55;white-space:pre-wrap;word-break:break-word}
  .bot .bubble{background:var(--bot-bubble);color:#1a2340;border-bottom-left-radius:6px}
  .user .bubble{background:var(--user-bubble);color:#fff;border-bottom-right-radius:6px;box-shadow:0 10px 22px -10px rgba(0,87,184,.6)}
  .time{font-size:10.5px;color:var(--sub);margin:3px 4px 0}
  .dots{display:flex;gap:4px;padding:14px 16px;background:var(--bot-bubble);border-radius:18px;border-bottom-left-radius:6px}
  .dots span{width:7px;height:7px;border-radius:50%;background:#b0bcd4;animation:bounce 1.2s infinite}
  .dots span:nth-child(2){animation-delay:.15s}.dots span:nth-child(3){animation-delay:.3s}
  form{padding:14px 16px;border-top:1px solid var(--line);display:flex;gap:10px;align-items:center;background:#fff}
  .field{flex:1;display:flex;align-items:center;background:#f0f4fb;border:1.5px solid transparent;border-radius:16px;padding:2px 6px 2px 16px;transition:border-color .15s}
  .field:focus-within{border-color:var(--brand);background:#fff}
  input{flex:1;border:none;background:transparent;outline:none;font-size:14.5px;padding:12px 0;color:var(--ink)}
  input::placeholder{color:#a7adc4}
  #send{width:44px;height:44px;flex:none;border:none;border-radius:14px;cursor:pointer;
    background:linear-gradient(135deg,var(--brand),var(--brand-2));color:#fff;font-size:18px;
    display:flex;align-items:center;justify-content:center;transition:transform .12s,opacity .15s;
    box-shadow:0 10px 20px -8px rgba(0,87,184,.6)}
  #send:active{transform:scale(.92)}
  #send:disabled{opacity:.45;cursor:default}
  @keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.55}30%{transform:translateY(-5px);opacity:1}}
</style>
</head>
<body>
  <div class="app">
    <header>
      <div class="avatar">정</div>
      <div class="htxt">
        <h1>정부24 민원도우미</h1>
        <p>24시간 민원 안내</p>
      </div>
      <div class="badge">공식 서비스</div>
    </header>
    <div id="log"></div>
    <form id="f">
      <div class="field">
        <input id="q" placeholder="민원 관련 질문을 입력하세요…" autocomplete="off" autofocus>
      </div>
      <button id="send" type="submit" aria-label="전송">↑</button>
    </form>
  </div>
<script>
  const log=document.getElementById('log'),form=document.getElementById('f'),
        input=document.getElementById('q'),sendBtn=document.getElementById('send');
  const now=()=>new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});

  function bubble(text,who){
    const row=document.createElement('div');row.className='row '+who;
    const pic=document.createElement('div');pic.className='pic';pic.textContent=who==='bot'?'정':'나';
    const wrap=document.createElement('div');
    const b=document.createElement('div');b.className='bubble';b.textContent=text;
    const t=document.createElement('div');t.className='time';t.textContent=now();
    wrap.appendChild(b);wrap.appendChild(t);
    row.appendChild(pic);row.appendChild(wrap);
    log.appendChild(row);log.scrollTop=log.scrollHeight;
    return b;
  }
  function typing(){
    const row=document.createElement('div');row.className='row bot';
    const pic=document.createElement('div');pic.className='pic';pic.textContent='정';
    const d=document.createElement('div');d.className='dots';d.innerHTML='<span></span><span></span><span></span>';
    row.appendChild(pic);row.appendChild(d);log.appendChild(row);log.scrollTop=log.scrollHeight;
    return row;
  }

  bubble('안녕하세요! 정부24 민원도우미입니다 😊\n민원 신청, 서류 발급, 기관 안내를 도와드릴게요.','bot');

  form.addEventListener('submit',async e=>{
    e.preventDefault();
    const msg=input.value.trim();if(!msg)return;
    bubble(msg,'user');input.value='';sendBtn.disabled=true;
    const t=typing();
    try{
      const r=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
      const data=await r.json();t.remove();
      bubble(data.reply||'(빈 응답)','bot');
    }catch(err){t.remove();bubble('일시적으로 연결이 원활하지 않습니다. 잠시 후 다시 시도해주세요.','bot');}
    finally{sendBtn.disabled=false;input.focus();}
  });
</script>
</body>
</html>
