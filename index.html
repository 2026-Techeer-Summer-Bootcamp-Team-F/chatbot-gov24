<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정부24 — 민원도우미</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --gov-blue:#0057B8;
  --gov-blue-dark:#003D82;
  --gov-blue-light:#EAF2FF;
  --gov-red:#C9151E;
  --ink:#1A1D2E;
  --ink-2:#4A4F6A;
  --ink-3:#8B90A8;
  --bg:#F0F3F8;
  --card:#FFFFFF;
  --line:#D8DCE8;
  --msg-gov:#EEF4FF;
  --msg-user:#0057B8;
}

body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:20px;
  position:relative;
  overflow:hidden;
}

/* 배경 패턴 */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(0,87,184,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,87,184,.03) 1px, transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
}

body::after{
  content:'';
  position:fixed;
  top:-200px;right:-200px;
  width:600px;height:600px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(0,87,184,.06) 0%, transparent 70%);
  pointer-events:none;
}

.shell{
  width:min(480px,100%);
  height:min(760px,94vh);
  display:flex;
  flex-direction:column;
  background:var(--card);
  border-radius:4px;
  overflow:hidden;
  box-shadow:
    0 0 0 1px rgba(0,87,184,.12),
    0 4px 6px -2px rgba(0,40,120,.06),
    0 24px 48px -12px rgba(0,40,120,.14);
  position:relative;
  z-index:1;
}

/* ── 상단 파란 띠 ── */
.top-bar{
  background:var(--gov-blue);
  padding:8px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.top-bar-label{
  font-size:10.5px;
  font-weight:500;
  color:rgba(255,255,255,.75);
  letter-spacing:.6px;
  text-transform:uppercase;
}
.top-bar-status{
  display:flex;
  align-items:center;
  gap:5px;
  font-size:10px;
  color:rgba(255,255,255,.7);
}
.top-bar-status::before{
  content:'';
  width:5px;height:5px;
  border-radius:50%;
  background:#5CDB95;
  box-shadow:0 0 6px #5CDB95;
  animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ── 헤더 ── */
header{
  padding:18px 20px 16px;
  border-bottom:2px solid var(--gov-blue);
  background:var(--card);
  position:relative;
}
.header-inner{
  display:flex;
  align-items:center;
  gap:14px;
}
.emblem{
  width:48px;height:48px;flex:none;
  background:var(--gov-blue);
  border-radius:3px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Noto Serif KR',serif;
  font-size:20px;font-weight:600;
  color:#fff;
  position:relative;
  overflow:hidden;
}
.emblem::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.15) 0%,transparent 60%);
}
.emblem-inner{position:relative;z-index:1;line-height:1}
.header-text{}
.header-text h1{
  font-family:'Noto Serif KR',serif;
  font-size:17px;font-weight:600;
  color:var(--ink);
  letter-spacing:-.3px;
  line-height:1.2;
}
.header-text .sub{
  font-size:11px;
  color:var(--ink-3);
  margin-top:3px;
  display:flex;align-items:center;gap:6px;
}
.header-text .sub .dept{
  background:var(--gov-blue-light);
  color:var(--gov-blue);
  padding:2px 7px;
  border-radius:2px;
  font-size:10px;font-weight:600;
  letter-spacing:.3px;
}
.header-notice{
  margin-top:11px;
  padding:8px 12px;
  background:#FFF8E1;
  border-left:3px solid #F59E0B;
  border-radius:0 2px 2px 0;
  font-size:11px;
  color:#92400E;
  line-height:1.5;
}

/* ── 채팅 영역 ── */
#log{
  flex:1;
  overflow-y:auto;
  padding:20px 18px;
  display:flex;
  flex-direction:column;
  gap:16px;
  background:linear-gradient(180deg,#F7F9FC 0%,#FFFFFF 100%);
  scroll-behavior:smooth;
}
#log::-webkit-scrollbar{width:4px}
#log::-webkit-scrollbar-track{background:transparent}
#log::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:2px}

.msg{display:flex;gap:10px;animation:fadeUp .22s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.msg.user{flex-direction:row-reverse}

.msg-icon{
  width:32px;height:32px;flex:none;
  border-radius:3px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:600;
  align-self:flex-end;
}
.msg.gov .msg-icon{
  background:var(--gov-blue);
  color:#fff;
  font-family:'Noto Serif KR',serif;
}
.msg.user .msg-icon{
  background:#E2E8F0;
  color:var(--ink-2);
}

.msg-body{max-width:82%}
.msg-sender{
  font-size:10px;font-weight:600;
  color:var(--ink-3);
  margin-bottom:4px;
  letter-spacing:.3px;
}
.msg.user .msg-sender{text-align:right}

.bubble{
  padding:11px 14px;
  font-size:14px;line-height:1.65;
  white-space:pre-wrap;word-break:break-word;
  border-radius:3px;
}
.msg.gov .bubble{
  background:var(--msg-gov);
  color:var(--ink);
  border:1px solid rgba(0,87,184,.1);
  border-bottom-left-radius:0;
}
.msg.user .bubble{
  background:var(--msg-user);
  color:#fff;
  border-bottom-right-radius:0;
  box-shadow:0 2px 8px rgba(0,87,184,.3);
}
.msg-time{
  font-size:10px;color:var(--ink-3);
  margin-top:4px;
}
.msg.user .msg-time{text-align:right}

/* 날짜 구분선 */
.date-divider{
  display:flex;align-items:center;gap:10px;
  font-size:10.5px;color:var(--ink-3);
  font-weight:500;letter-spacing:.5px;
}
.date-divider::before,.date-divider::after{
  content:'';flex:1;height:1px;background:var(--line);
}

/* 타이핑 */
.typing-dots{
  display:flex;gap:4px;padding:12px 14px;
  background:var(--msg-gov);
  border:1px solid rgba(0,87,184,.1);
  border-radius:3px;border-bottom-left-radius:0;
  width:fit-content;
}
.typing-dots span{
  width:6px;height:6px;border-radius:50%;
  background:var(--gov-blue);opacity:.4;
  animation:dot 1.2s infinite;
}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}

/* ── 입력창 ── */
.input-area{
  border-top:1px solid var(--line);
  background:var(--card);
  padding:0;
}
.quick-actions{
  padding:10px 14px 0;
  display:flex;gap:6px;flex-wrap:wrap;
}
.quick-btn{
  font-size:11px;font-weight:500;
  color:var(--gov-blue);
  background:var(--gov-blue-light);
  border:1px solid rgba(0,87,184,.2);
  border-radius:2px;
  padding:4px 10px;
  cursor:pointer;
  transition:all .15s;
  white-space:nowrap;
  font-family:'Noto Sans KR',sans-serif;
}
.quick-btn:hover{background:var(--gov-blue);color:#fff}

form{
  padding:10px 14px 14px;
  display:flex;gap:8px;align-items:flex-end;
}
.input-wrap{
  flex:1;
  background:#F7F9FC;
  border:1px solid var(--line);
  border-radius:3px;
  display:flex;align-items:center;
  padding:2px 4px 2px 12px;
  transition:border-color .15s,box-shadow .15s;
}
.input-wrap:focus-within{
  border-color:var(--gov-blue);
  box-shadow:0 0 0 3px rgba(0,87,184,.1);
  background:#fff;
}
textarea{
  flex:1;border:none;background:transparent;outline:none;
  font-size:13.5px;line-height:1.5;
  font-family:'Noto Sans KR',sans-serif;
  color:var(--ink);
  resize:none;
  padding:9px 4px;
  max-height:80px;
  min-height:38px;
}
textarea::placeholder{color:#A0A8C0;font-size:13px}

#send{
  width:40px;height:40px;flex:none;
  border:none;border-radius:3px;cursor:pointer;
  background:var(--gov-blue);
  color:#fff;font-size:15px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
  align-self:flex-end;
  margin-bottom:2px;
}
#send:hover{background:var(--gov-blue-dark)}
#send:active{transform:scale(.94)}
#send:disabled{opacity:.4;cursor:default}

/* ── 하단 푸터 ── */
.footer{
  padding:8px 16px;
  background:#F7F9FC;
  border-top:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;
}
.footer-txt{font-size:10px;color:var(--ink-3)}
.footer-links{display:flex;gap:12px}
.footer-links a{font-size:10px;color:var(--ink-3);text-decoration:none}
.footer-links a:hover{color:var(--gov-blue)}
</style>
</head>
<body>
<div class="shell">

  <!-- 상단 파란 띠 -->
  <div class="top-bar">
    <span class="top-bar-label">대한민국 전자정부</span>
    <span class="top-bar-status">AI 상담 운영 중</span>
  </div>

  <!-- 헤더 -->
  <header>
    <div class="header-inner">
      <div class="emblem"><div class="emblem-inner">정</div></div>
      <div class="header-text">
        <h1>정부24 민원도우미</h1>
        <div class="sub">
          <span class="dept">행정안전부</span>
          민원 서비스 · AI 안내
        </div>
      </div>
    </div>
    <div class="header-notice">
      본 서비스는 민원 안내 목적으로만 운영됩니다. 개인정보 입력 시 주의하시기 바랍니다.
    </div>
  </header>

  <!-- 채팅 로그 -->
  <div id="log">
    <div class="date-divider" id="date-div"></div>
  </div>

  <!-- 입력 영역 -->
  <div class="input-area">
    <div class="quick-actions">
      <button class="quick-btn" onclick="quickSend(this)">주민등록등본 발급</button>
      <button class="quick-btn" onclick="quickSend(this)">가족관계증명서</button>
      <button class="quick-btn" onclick="quickSend(this)">민원 처리 조회</button>
      <button class="quick-btn" onclick="quickSend(this)">담당 기관 문의</button>
    </div>
    <form id="f">
      <div class="input-wrap">
        <textarea id="q" placeholder="민원 내용을 입력하세요…" rows="1" autocomplete="off"></textarea>
      </div>
      <button id="send" type="submit" aria-label="전송">↑</button>
    </form>
  </div>

  <!-- 푸터 -->
  <div class="footer">
    <span class="footer-txt">정부24 AI 민원도우미 · 행정안전부</span>
    <div class="footer-links">
      <a href="#">이용안내</a>
      <a href="#">개인정보처리방침</a>
    </div>
  </div>

</div>

<script>
const log = document.getElementById('log');
const form = document.getElementById('f');
const input = document.getElementById('q');
const sendBtn = document.getElementById('send');

// 날짜 헤더
const datDiv = document.getElementById('date-div');
datDiv.childNodes[0] && (datDiv.textContent = '');
const today = new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
datDiv.innerHTML = `<span></span><span>${today}</span><span></span>`;
datDiv.style.cssText='display:flex;align-items:center;gap:10px;font-size:10.5px;color:var(--ink-3);font-weight:500;letter-spacing:.5px;';
['::before','::after'].forEach(p=>{});

const now = () => new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});

function addMsg(text, who) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${who}`;

  const icon = document.createElement('div');
  icon.className = 'msg-icon';
  icon.textContent = who === 'gov' ? '정' : '나';

  const body = document.createElement('div');
  body.className = 'msg-body';

  const sender = document.createElement('div');
  sender.className = 'msg-sender';
  sender.textContent = who === 'gov' ? '정부24 민원도우미' : '민원인';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;

  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = now();

  body.append(sender, bubble, time);
  wrap.append(icon, body);
  log.appendChild(wrap);
  log.scrollTop = log.scrollHeight;
  return bubble;
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg gov';
  const icon = document.createElement('div');
  icon.className = 'msg-icon';
  icon.textContent = '정';
  const dots = document.createElement('div');
  dots.className = 'typing-dots';
  dots.innerHTML = '<span></span><span></span><span></span>';
  wrap.append(icon, dots);
  log.appendChild(wrap);
  log.scrollTop = log.scrollHeight;
  return wrap;
}

// 초기 메시지
setTimeout(() => {
  addMsg('안녕하세요. 정부24 AI 민원도우미입니다.\n민원 신청 절차, 서류 발급, 담당 기관 안내 등 궁금하신 사항을 말씀해 주세요.', 'gov');
}, 300);

function quickSend(btn) {
  input.value = btn.textContent;
  form.dispatchEvent(new Event('submit'));
}

// textarea 자동 높이
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 80) + 'px';
});

// Enter 전송 (Shift+Enter 줄바꿈)
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    form.dispatchEvent(new Event('submit'));
  }
});

form.addEventListener('submit', async e => {
  e.preventDefault();
  const msg = input.value.trim();
  if (!msg) return;
  addMsg(msg, 'user');
  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;
  const t = showTyping();
  try {
    const r = await fetch('/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: msg})
    });
    const data = await r.json();
    t.remove();
    addMsg(data.reply || '(빈 응답)', 'gov');
  } catch {
    t.remove();
    addMsg('일시적으로 서비스 연결이 원활하지 않습니다. 잠시 후 다시 시도해 주십시오.', 'gov');
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
});
</script>
</body>
</html>
